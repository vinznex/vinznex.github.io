name: Update Database

on:
  schedule:
    - cron: '*/30 * * * *' # Runs automatically every 30 minutes
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run generation script
        run: python generate_json.py

      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add songs.json artists.json albums.json events.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database from Google Sheets" && git push)
